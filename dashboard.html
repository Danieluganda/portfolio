  /* ── Device Financing ──────────────────────────────────────────────────── */
  function buildDevicesHTML(p) {
    const total   = p.stats.total;
    const disPct  = (p.disability_pct   || 0).toFixed(1);
    const regPct  = (p.business_reg_pct || 0).toFixed(1);
    const withDis = p.stats.with_disability || 0;
    const bizReg  = p.stats.business_reg    || 0;

    const deviceTypes     = p.device_types     || {};
    const priceBands      = p.price_bands      || {};
    const paymentDuration = p.payment_duration || {};
    const esoHubs         = p.eso_hubs         || {};
    const idTypes         = p.id_types         || {};
    const regBody         = p.reg_body         || {};
    const disTypes        = p.disability_types || {};
    const deviceByEso     = p.device_by_eso    || {};
    const simReg          = p.sim_registered   || {};
    const weeklyAct       = p.weekly_activity  || {};
    const esoWeekly       = p.eso_weekly       || {};
    const devWeekly       = p.device_weekly    || {};
    const priceStats      = p.price_stats      || {};

    const deviceTotal  = Object.values(deviceTypes).reduce((a,b)=>a+b,0)     || 1;
    const priceTotal   = Object.values(priceBands).reduce((a,b)=>a+b,0)      || 1;
    const payTotal     = Object.values(paymentDuration).reduce((a,b)=>a+b,0) || 1;
    const esoTotal     = Object.values(esoHubs).reduce((a,b)=>a+b,0)         || 1;
    const idTotal      = Object.values(idTypes).reduce((a,b)=>a+b,0)         || 1;
    const regBodyTotal = Object.values(regBody).reduce((a,b)=>a+b,0)         || 1;
    const simRegTotal  = Object.values(simReg).reduce((a,b)=>a+b,0)          || 1;

    const appsWk  = weeklyAct.apps_this_week  || 0;
    const appsLwk = weeklyAct.apps_last_week  || 0;
    const appsMo  = weeklyAct.apps_this_month || 0;
    const avgPrice= priceStats.avg    ? 'UGX ' + fmt(priceStats.avg)    : '—';
    const medPrice= priceStats.median ? 'UGX ' + fmt(priceStats.median) : '—';

    const DEVICE_COLORS = {
      'Smartphone': '#3B82F6', 'Tablet': '#8B5CF6', 'Laptop': '#10B981',
      'POS': '#F59E0B', 'Software': '#EF4444'
    };
    const PRICE_COLORS = {
      'Under 200K': '#6EE7B7', '200K–500K': '#34D399',
      '500K–1M': '#10B981', '1M–2M': '#059669', '2M+': '#047857'
    };
    const PAY_COLORS = {
      'Weekly': '#60A5FA', 'Bi-Weekly': '#3B82F6', 'Monthly': '#2563EB',
      'Quarterly': '#1D4ED8', 'Semi-Annual': '#1E40AF', 'Yearly': '#1E3A8A'
    };

    // ── ESO performance rows (sorted by total, filtered) ───────────────
    const ESO_FILTER = ['Other', 'FindingXY', 'Test', 'Tests'];
    const esoRanked = Object.entries(esoWeekly)
      .filter(([k]) => !ESO_FILTER.includes(k))
      .sort((a, b) => b[1].total - a[1].total);

    const esoRankRows = esoRanked.map(([eso, d], i) => {
      const barW  = Math.min(d.total / (esoRanked[0][1].total || 1) * 100, 100).toFixed(1);
      const color = i === 0 ? '#3B82F6' : i === 1 ? '#8B5CF6' : i === 2 ? '#10B981' : '#64748B';
      const rank  = i < 3
        ? `<span class="rank-badge rank-${i+1}">${i+1}</span>`
        : `<span style="font-size:.62rem;color:#CBD5E1;padding-right:2px">${i+1}</span>`;
      return `<div class="eso-perf-row">
        <div class="eso-name">${rank} ${eso}</div>
        <div class="eso-bar-wrap"><div class="eso-bar-fill" style="width:${barW}%;background:${color}"></div></div>
        <div class="eso-stat">${d.total.toLocaleString()}</div>
        <div class="eso-stat" style="color:#10B981">↑${d.this_week} wk</div>
        <div class="eso-stat" style="color:#6366F1">↑${d.this_month} mo</div>
      </div>`;
    }).join('');

    // ── Top ESOs this week ──────────────────────────────────────────────
    const topWk = Object.entries(esoWeekly)
      .filter(([k]) => !ESO_FILTER.includes(k) && k !== 'MUBS_EIIC')
      .sort((a, b) => b[1].this_week - a[1].this_week)
      .slice(0, 5);
    const topWkRows = topWk.map(([eso, d], i) => {
      const medals = ['🥇','🥈','🥉'];
      const medal  = medals[i] || `${i+1}.`;
      return `<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">
        <span style="font-size:.85rem;min-width:22px">${medal}</span>
        <span style="font-size:.72rem;font-weight:700;color:#1E293B;flex:1">${eso}</span>
        <span style="font-size:.72rem;font-weight:800;color:#3B82F6">${d.this_week}</span>
      </div>`;
    }).join('') || '<div class="no-data-note">No data for this week</div>';

    // ── Top ESOs last week ──────────────────────────────────────────────
    const topLwk = Object.entries(esoWeekly)
      .filter(([k]) => !ESO_FILTER.includes(k))
      .sort((a, b) => b[1].last_week - a[1].last_week)
      .slice(0, 5);
    const topLwkRows = topLwk.map(([eso, d], i) => {
      const medals = ['🥇','🥈','🥉'];
      const medal  = medals[i] || `${i+1}.`;
      return `<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">
        <span style="font-size:.85rem;min-width:22px">${medal}</span>
        <span style="font-size:.72rem;font-weight:700;color:#1E293B;flex:1">${eso}</span>
        <span style="font-size:.72rem;font-weight:800;color:#6366F1">${d.last_week}</span>
      </div>`;
    }).join('') || '<div class="no-data-note">No data last week</div>';

    // ── Device type weekly rows ─────────────────────────────────────────
    const devWeeklyRows = Object.entries(devWeekly).sort((a,b)=>b[1].total-a[1].total).map(([dev, d]) => {
      const barW  = Math.min(d.total / (deviceTotal || 1) * 100, 100).toFixed(1);
      const color = DEVICE_COLORS[dev] || '#64748B';
      return `<div class="dev-weekly-row">
        <div class="dw-name">${dev}</div>
        <div style="position:relative;height:10px;background:#E8EDF2;border-radius:2px;overflow:hidden">
          <div style="position:absolute;left:0;top:0;height:100%;background:${color};border-radius:2px;width:${barW}%"></div>
        </div>
        <div class="dw-stat">${d.total.toLocaleString()}</div>
        <div class="dw-stat" style="color:#10B981">${d.this_week}</div>
        <div class="dw-stat" style="color:#6366F1">${d.this_month}</div>
      </div>`;
    }).join('') || '<div class="no-data-note">No device weekly data</div>';

    return `
      <div class="port-header">
        <div class="port-bar-strip"><div class="port-bar-orange"></div><div class="port-bar-blue"></div></div>
        <div class="port-title-area">
          <div class="port-title">${p.name}</div>
          <div class="port-filename">${p.filename}</div>
        </div>
      </div>

      <!-- KPI strip -->
      <div class="kpi-strip-7">
        ${kpiBox(fmt(total),    'Total Applications', 'ko')}
        ${kpiBox(appsWk,        'This Week',          'kg')}
        ${kpiBox(appsLwk,       'Last Week',          'kb')}
        ${kpiBox(appsMo,        'This Month',         'kp')}
        ${kpiBox(disPct + '%',  'Disability Rate',    'kr')}
        ${kpiBox(regPct + '%',  'Business Reg. Rate', 'kt')}
        ${kpiBox(avgPrice,      'Avg Device Price',   'ka')}
      </div>

      <!-- Activity strip -->
      <div class="activity-strip" style="grid-template-columns:repeat(3,1fr) repeat(3,1fr)">
        <div class="act-card act-green">
          <div class="act-val">${appsWk.toLocaleString()}</div>
          <div class="act-lbl">Apps This Week</div>
        </div>
        <div class="act-card act-green">
          <div class="act-val">${appsLwk.toLocaleString()}</div>
          <div class="act-lbl">Apps Last Week</div>
        </div>
        <div class="act-card act-green">
          <div class="act-val">${appsMo.toLocaleString()}</div>
          <div class="act-lbl">Apps This Month</div>
        </div>
        <div class="act-card act-blue">
          <div class="act-val">${medPrice}</div>
          <div class="act-lbl">Median Price</div>
        </div>
        <div class="act-card act-blue">
          <div class="act-val">${withDis}</div>
          <div class="act-lbl">With Disability</div>
        </div>
        <div class="act-card act-blue">
          <div class="act-val">${bizReg}</div>
          <div class="act-lbl">Business Registered</div>
        </div>
      </div>

      <!-- ROW 1: Location | ESO Performance Ranking -->
      <div class="three-col">
        <div class="col-section" style="grid-column:span 2">
          <div class="col-hdr purple-hdr">DISTRIBUTION BY LOCATION</div>
          <div class="col-body">
            ${districtBarRowsHTML(p.districts || {}, 10)}
          </div>
        </div>
        <div class="col-section">
          <div class="col-hdr teal-hdr">ESO PARTNER PERFORMANCE</div>
          <div class="col-body">
            ${esoRanked.length ? `
              <div class="eso-perf-row" style="margin-bottom:4px">
                <div style="font-size:.6rem;color:#94A3B8;font-weight:700">ESO</div>
                <div></div>
                <div style="font-size:.6rem;color:#94A3B8;text-align:right">Total</div>
                <div style="font-size:.6rem;color:#10B981;text-align:right">This Wk</div>
                <div style="font-size:.6rem;color:#6366F1;text-align:right">This Mo</div>
              </div>
              ${esoRankRows}` : barRowsHTML(esoHubs, null, esoTotal, 12)}
          </div>
        </div>
      </div>

      <!-- ROW 2: Device Types | Price & Payment | ID & Registration -->
      <div class="three-col" style="margin-top:12px">
        <div class="col-section">
          <div class="col-hdr indigo-hdr">DEVICE TYPES REQUESTED</div>
          <div class="col-body">
            ${Object.keys(deviceTypes).length
              ? Object.entries(deviceTypes).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([device,count],i) => {
                  const w     = Math.min(count/deviceTotal*100,100).toFixed(1);
                  const pct   = (count/deviceTotal*100).toFixed(1);
                  const color = DEVICE_COLORS[device] || PALETTE[i % PALETTE.length];
                  const esoD  = deviceByEso[device] || {};
                  const esoT  = Object.values(esoD).reduce((a,b)=>a+b,0) || 1;
                  return `<div class="device-expand-row" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')">
                    <div class="bar-row">
                      <div class="bar-track"><div class="bar-fill" style="width:${w}%;background:${color}"></div></div>
                      <span class="bar-name" title="${device}">${device}</span>
                      <span class="bar-stat">${count.toLocaleString()}&ensp;${pct}%</span>
                      <span class="drill-arrow">&#9658;</span>
                    </div>
                  </div>
                  <div class="device-drill-panel">
                    <div class="drill-label">By ESO / Hub</div>
                    ${Object.keys(esoD).length ? barRowsHTML(esoD, null, esoT, 8) : '<div class="no-data-note">No ESO breakdown available</div>'}
                  </div>`;
                }).join('')
              : '<div class="no-data-note">No device type data</div>'}
          </div>
        </div>
        <div class="col-section">
          <div class="col-hdr orange-hdr">PRICE &amp; PAYMENT</div>
          <div class="col-body">
            <div class="sub-hdr orange-txt">PRICE RANGE (UGX)</div>
            ${Object.keys(priceBands).length
              ? barRowsHTML(priceBands, PRICE_COLORS, priceTotal, 6)
              : '<div class="no-data-note">No price data</div>'}
            <div class="sub-hdr orange-txt" style="margin-top:10px">PAYMENT PERIOD PREFERENCE</div>
            ${Object.keys(paymentDuration).length
              ? barRowsHTML(paymentDuration, PAY_COLORS, payTotal, 6)
              : '<div class="no-data-note">No payment period data</div>'}
          </div>
        </div>
        <div class="col-section">
          <div class="col-hdr green-hdr">ID &amp; REGISTRATION</div>
          <div class="col-body">
            <div class="sub-hdr green-txt">ID TYPE</div>
            ${Object.keys(idTypes).length
              ? barRowsHTML(idTypes, null, idTotal, 5)
              : '<div class="no-data-note">No ID type data</div>'}
            <div class="sub-hdr green-txt" style="margin-top:8px">REGISTRATION BODY</div>
            ${Object.keys(regBody).length
              ? barRowsHTML(regBody, null, regBodyTotal, 5)
              : '<div class="no-data-note">No registration data</div>'}
            <div class="sub-hdr green-txt" style="margin-top:8px">DISABILITY STATUS</div>
            ${barRowsHTML({'With Disability': withDis, 'Without': total - withDis},
                {'With Disability':'#EF4444','Without':'#10B981'}, total, 2)}
            ${Object.keys(disTypes).length
              ? `<div class="sub-hdr green-txt" style="margin-top:6px">DISABILITY TYPES</div>
                 ${barRowsHTML(disTypes, null, withDis || 1, 6)}`
              : ''}
            <div class="sub-hdr green-txt" style="margin-top:8px">SIM REGISTERED IN OWN NAME</div>
            ${Object.keys(simReg).length
              ? barRowsHTML(simReg, {'Yes':'#10B981','No':'#EF4444'}, simRegTotal, 3)
              : '<div class="no-data-note">No SIM registration data</div>'}
          </div>
        </div>
      </div>

      <!-- ROW 3: Top ESOs This Week | Top ESOs Last Week | Device Weekly Breakdown -->
      <div class="three-col" style="margin-top:12px">
        <div class="col-section">
          <div class="col-hdr indigo-hdr">🏆 TOP ESOs — THIS WEEK</div>
          <div class="col-body">
            ${topWkRows}
          </div>
        </div>
        <div class="col-section">
          <div class="col-hdr purple-hdr">🏆 TOP ESOs — LAST WEEK</div>
          <div class="col-body">
            ${topLwkRows}
          </div>
        </div>
        <div class="col-section">
          <div class="col-hdr orange-hdr">DEVICE TYPE ACTIVITY</div>
          <div class="col-body">
            <div class="dev-weekly-row" style="margin-bottom:6px">
              <div style="font-size:.6rem;color:#94A3B8;font-weight:700">Device</div>
              <div></div>
              <div style="font-size:.6rem;color:#94A3B8;text-align:right">Total</div>
              <div style="font-size:.6rem;color:#10B981;text-align:right">Wk</div>
              <div style="font-size:.6rem;color:#6366F1;text-align:right">Mo</div>
            </div>
            ${devWeeklyRows}
          </div>
        </div>
      </div>`;
  }

  /* ═══════════════════════════════════════════════════════════════
     HTML BUILDERS — SEGMENTATION / GROWTH PLANS (existing)
  ═══════════════════════════════════════════════════════════════ */
  function buildSegmentationHTML(p, pid) {
    const total      = p.stats.total;
    const femalePct  = (p.female_pct != null) ? p.female_pct.toFixed(1)
                       : (p.gender && p.gender['Female'] ? (p.gender['Female'] / total * 100).toFixed(1) : '0');
    const malePct    = (100 - parseFloat(femalePct)).toFixed(1);
    const youthPct   = (p.youth_pct  != null) ? p.youth_pct.toFixed(1)  : '0';
    const ruralPct   = (p.rural_pct  != null) ? p.rural_pct.toFixed(1)  : '0';
    const avgRev     = p.avg_revenue_str || (p.revenue && p.revenue.mean > 0 ? 'UGX ' + fmt(p.revenue.mean) : '—');
    const mainSector = p.main_sector || (Object.entries(p.sectors || {}).sort((a,b)=>b[1]-a[1])[0]||[,'All'])[0];
    const hasGroups  = p.groups && Object.keys(p.groups).length > 0;
    const hasPwd     = (p.ursb || 0) + (p.pwd || 0) + (p.refugees || 0) > 0;

    const midSection2 = hasGroups
      ? `<div class="sub-hdr orange-txt" style="margin-top:10px">GROUPS &amp; COLLECTIVES (${p.collectives_total || 0} total)</div>
         ${barRowsHTML(p.groups, null, total, 8)}`
      : (p.employment_status && Object.keys(p.employment_status).length > 0
          ? `<div class="sub-hdr orange-txt" style="margin-top:10px">EMPLOYMENT STATUS</div>
             ${barRowsHTML(p.employment_status, null, total, 6)}`
          : '');

    const footerHTML = hasPwd
      ? `<div class="section-footer">
           <span><strong>${p.ursb || 0}</strong>URSB Reg.</span>
           <span><strong>${p.pwd  || 0}</strong>PWD Founders</span>
           <span><strong>${p.refugees || 0}</strong>Refugees</span>
           <span><strong>${avgRev}</strong>Avg Rev UGX</span>
         </div>`
      : `<div class="section-footer" style="grid-template-columns:1fr">
           <span><strong>${avgRev}</strong>Avg Revenue UGX</span>
         </div>`;

    return `
      <div class="port-header">
        <div class="port-bar-strip"><div class="port-bar-orange"></div><div class="port-bar-blue"></div></div>
        <div class="port-title-area">
          <div class="port-title">${p.name}</div>
          <div class="port-filename">${p.filename}</div>
        </div>
      </div>

      <div class="kpi-strip-7">
        ${kpiBox(fmt(total),           'Total Submissions', 'ko')}
        ${kpiBox(p.pwd      || 0,      'PWD Founders',      'kb')}
        ${kpiBox(p.refugees || 0,      'Refugee Founders',  'kr')}
        ${kpiBox(femalePct  + '%',     'Female Founders',   'kp')}
        ${kpiBox(youthPct   + '%',     'Youth (18–35)',      'kg')}
        ${kpiBox(ruralPct   + '%',     'Rural Location',    'kt')}
        ${kpiBox(fmt(p.fte),           'FTE Workers',       'ka')}
      </div>

      <div class="three-col">
        <div class="col-section">
          <div class="col-hdr green-hdr">SECTOR &amp; SUBSECTOR BREAKDOWN</div>
          <div class="col-body">
            <div class="sub-hdr green-txt">TOP SECTORS</div>
            ${barRowsHTML(p.sectors, SECTOR_COLORS, total, 8)}
            <div class="sub-hdr green-txt" style="margin-top:10px">TOP SUBSECTORS — ${mainSector}</div>
            ${barRowsHTML(p.subsectors, null, total, 8)}
          </div>
        </div>

        <div class="col-section">
          <div class="col-hdr orange-hdr">LOCATION &amp; GROUPS</div>
          <div class="col-body">
            <div class="sub-hdr orange-txt">LOCATION TYPE</div>
            ${barRowsHTML(p.location, LOCATION_COLORS, total, 4)}
            ${midSection2}
          </div>
          ${footerHTML}
        </div>

        <div class="col-section">
          <div class="col-hdr purple-hdr">ARCHETYPES &amp; DEMOGRAPHICS</div>
          <div class="col-body">
            <div class="sub-hdr purple-txt">MSME ARCHETYPES</div>
            ${barRowsHTML(p.archetypes, ARCHETYPE_COLORS, total, 6)}
            <div class="gender-line">♀ ${femalePct}% Female &nbsp;·&nbsp; ♂ ${malePct}% Male</div>
            <div class="sub-hdr purple-txt">AGE OF LEAD FOUNDER</div>
            ${ageBandRowsHTML(p.age_bands, total)}
            <div class="sub-hdr purple-txt" style="margin-top:10px">TOP DISTRICTS</div>
            ${districtBarRowsHTML(p.districts, 5)}
          </div>
        </div>
      </div>`;
  }

  function buildGrowthPlansHTML(p, pid) {
    const total        = p.stats.total;
    const districtCount = Object.keys(p.districts || {}).length;
    const womenPct     = total > 0 ? (p.women_led / total * 100).toFixed(1) : '0';
    const youthPct     = total > 0 ? (p.youth_led / total * 100).toFixed(1) : '0';
    const mainSector   = (Object.entries(p.sectors || {}).sort((a,b)=>b[1]-a[1])[0]||[,'All'])[0];

    const genderFemalePct = (p.gender && p.gender['Female'])
      ? (p.gender['Female'] / total * 100).toFixed(1) : '0';
    const genderMalePct = (100 - parseFloat(genderFemalePct)).toFixed(1);

    return `
      <div class="port-header">
        <div class="port-bar-strip"><div class="port-bar-orange"></div><div class="port-bar-blue"></div></div>
        <div class="port-title-area">
          <div class="port-title">${p.name}</div>
          <div class="port-filename">${p.filename}</div>
        </div>
      </div>

      <div class="kpi-strip-7">
        ${kpiBox(fmt(total),          'Total MSMEs',      'ko')}
        ${kpiBox(districtCount,        'Districts',        'kb')}
        ${kpiBox(p.women_led || 0,     'Women-Led',        'kp')}
        ${kpiBox(womenPct + '%',       'Women %',          'kr')}
        ${kpiBox(p.youth_led || 0,     'Youth-Led',        'kg')}
        ${kpiBox(youthPct + '%',       'Youth %',          'kt')}
        ${kpiBox(Object.keys(p.commodities || {}).length, 'Commodities', 'ka')}
      </div>

      <div class="three-col">
        <div class="col-section">
          <div class="col-hdr green-hdr">SECTORS &amp; COMMODITIES</div>
          <div class="col-body">
            <div class="sub-hdr green-txt">SECTOR BREAKDOWN</div>
            ${barRowsHTML(p.sectors, SECTOR_COLORS, total, 8)}
            <div class="sub-hdr green-txt" style="margin-top:10px">TOP COMMODITIES</div>
            ${barRowsHTML(p.commodities, null, total, 8)}
          </div>
        </div>

        <div class="col-section">
          <div class="col-hdr orange-hdr">DISTRICTS &amp; BUSINESS STRUCTURE</div>
          <div class="col-body">
            <div class="sub-hdr orange-txt">MSMEs BY DISTRICT</div>
            ${districtBarRowsHTML(p.districts, 10)}
            <div class="sub-hdr orange-txt" style="margin-top:10px">BUSINESS STRUCTURE</div>
            ${barRowsHTML(p.biz_structures, null, total, 6)}
          </div>
        </div>

        <div class="col-section">
          <div class="col-hdr purple-hdr">DEMOGRAPHICS &amp; VALUE CHAIN</div>
          <div class="col-body">
            <div class="sub-hdr purple-txt">VALUE CHAIN ROLES</div>
            ${barRowsHTML(p.value_chain, null, total, 6)}
            <div class="gender-line">♀ ${genderFemalePct}% Women &nbsp;·&nbsp; ♂ ${genderMalePct}% Men</div>
            ${Object.keys(p.age_bands || {}).length > 0
              ? `<div class="sub-hdr purple-txt">AGE DISTRIBUTION</div>${ageBandRowsHTML(p.age_bands, total)}`
              : ''}
          </div>
        </div>
      </div>`;
  }

  function buildOverviewHTML(portfolios) {
    const totalAll = portfolios.reduce((s, p) => s + p.stats.total, 0);
    const totalFTE = portfolios.reduce((s, p) => s + (p.fte || 0), 0);

    return `
      <div class="section-hdr">
        <h2>All Portfolios — Combined Overview</h2>
        <span class="type-badge badge-all">${portfolios.length} datasets</span>
      </div>

      <div class="kpi-row">
        ${portfolios.map((p, i) => {
          const colors = ['blue','green','amber','violet','pink','teal'];
          return kpi(p.name, fmt(p.stats.total), fmt(p.stats.clean) + ' clean records', colors[i % colors.length]);
        }).join('')}
        ${kpi('Grand Total', fmt(totalAll), 'across all portfolios', 'blue')}
        ${totalFTE > 0 ? kpi('Total FTE', fmt(totalFTE), 'full-time jobs supported', 'green') : ''}
      </div>

      <div class="cg cg-2">
        <div class="card">
          <h3>Portfolio Size Comparison</h3>
          <div class="chart-wrap"><canvas id="_ov-sizes"></canvas></div>
        </div>
        <div class="card">
          <h3>Combined Sector Distribution</h3>
          <div class="chart-wrap"><canvas id="_ov-sectors-donut"></canvas></div>
        </div>
      </div>

      <div class="card" style="margin-bottom:18px">
        <h3>Sector Breakdown by Portfolio (Grouped)</h3>
        <div class="chart-wrap" style="max-height:none"><canvas id="_ov-sectors-grouped" style="max-height:340px"></canvas></div>
      </div>

      <div class="cg cg-2">
        <div class="card">
          <h3>Combined Gender Distribution</h3>
          <div class="chart-wrap squat"><canvas id="_ov-gender"></canvas></div>
        </div>
        <div class="card">
          <h3>Combined Location Distribution</h3>
          <div class="chart-wrap squat"><canvas id="_ov-location"></canvas></div>
        </div>
      </div>
    `;
  }

  /* ═══════════════════════════════════════════════════════════════
     CHART INITIALIZATION  (overview tab only — portfolio tabs use CSS bars)
  ═══════════════════════════════════════════════════════════════ */
  function initOverviewCharts(portfolios) {
    /* Portfolio sizes bar */
    const names  = portfolios.map(p => p.name);
    const sizes  = portfolios.map(p => p.stats.total);
    const colors = portfolios.map((_, i) => PORTFOLIO_COLORS[i % PORTFOLIO_COLORS.length]);
    makeChart('_ov-sizes', 'bar', names, [{
      data: sizes,
      backgroundColor: colors,
      borderRadius: 6,
    }], {
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => ` ${Number(c.raw).toLocaleString()} records` } } },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 11 } } },
        y: { grid: { color: '#F1F5F9' }, ticks: { font: { size: 11 } } }
      }
    });

    /* Combined sectors donut */
    const allSectors = {};
    portfolios.forEach(p => {
      Object.entries(p.sectors || {}).forEach(([k, v]) => { allSectors[k] = (allSectors[k] || 0) + v; });
    });
    donut('_ov-sectors-donut', allSectors, SECTOR_COLORS);

    /* Grouped bar: sectors × portfolio */
    const sectorKeys = Object.entries(allSectors).sort((a, b) => b[1] - a[1]).map(e => e[0]);
    const datasets = portfolios.map((p, i) => ({
      label: p.name,
      data: sectorKeys.map(s => (p.sectors || {})[s] || 0),
      backgroundColor: PORTFOLIO_COLORS[i % PORTFOLIO_COLORS.length],
      borderRadius: 3,
    }));
    makeChart('_ov-sectors-grouped', 'bar', sectorKeys, datasets, {
      plugins: {
        legend: { display: true, position: 'bottom', labels: { font: { size: 11 }, padding: 12, usePointStyle: true } },
        tooltip: { mode: 'index' }
      },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 11 } } },
        y: { grid: { color: '#F1F5F9' }, ticks: { font: { size: 11 } } }
      }
    });

    /* Combined gender */
    const allGender = {};
    portfolios.forEach(p => {
      Object.entries(p.gender || {}).forEach(([k, v]) => { allGender[k] = (allGender[k] || 0) + v; });
    });
    donut('_ov-gender', allGender, GENDER_COLORS);

    /* Combined location */
    const allLocation = {};
    portfolios.forEach(p => {
      const src = p.location || {};
      Object.entries(src).forEach(([k, v]) => { allLocation[k] = (allLocation[k] || 0) + v; });
    });
    donut('_ov-location', allLocation, LOCATION_COLORS);
  }

  /* ═══════════════════════════════════════════════════════════════
     TWO-TIER NAVIGATION
  ═══════════════════════════════════════════════════════════════ */
  const TYPE_ORDER = ['eoi','foundation','yiw','buz_needs','devices','platforms','growth_plans'];
  const TYPE_LABELS = {
    eoi:          'EOI & Segmentation',
    foundation:   'Foundation',
    yiw:          'Youth in Work',
    buz_needs:    'Business Needs',
    devices:      'Devices',
    platforms:    'Platforms',
    growth_plans: 'Growth Plans',
    eso_report:   'ESO Report', // NEW TAB
  };

  let _activeType  = null;
  let _activePanel = null;
  let _panels      = {};
  let _typeSubTabs = {};   // type → [{btn, pid}]

  function showPanel(pid) {
    if (_activePanel === pid) return;
    if (_activePanel) destroyPanel(_activePanel);
    _activePanel = pid;

    document.querySelectorAll('.panel').forEach(el => el.classList.remove('active'));
    const panel = document.getElementById(pid);
    if (panel) panel.classList.add('active');

    // Highlight correct sub-tab for current type
    (_typeSubTabs[_activeType] || []).forEach(({ btn, pid: bpid }) => {
      btn.classList.toggle('active', bpid === pid);
    });

    const meta = _panels[pid];
    if (meta && meta.type === 'overview') {
      requestAnimationFrame(() => initOverviewCharts(meta.portfolios));
    }
  }

  function showTypeGroup(type) {
    _activeType = type;

    // Update tier-1 highlight
    document.querySelectorAll('.type-tab-btn').forEach(b => b.classList.remove('active'));
    const typeBtn = document.querySelector(`.type-tab-btn[data-type="${type}"]`);
    if (typeBtn) typeBtn.classList.add('active');

    // Repopulate sub-tabs bar
    const subBar = document.getElementById('sub-tabs-bar');
    subBar.innerHTML = '';
    (_typeSubTabs[type] || []).forEach(({ btn }) => subBar.appendChild(btn));

    // Show first panel in this type
    const subs = _typeSubTabs[type] || [];
    if (subs.length) showPanel(subs[0].pid);
  }

  /* ═══════════════════════════════════════════════════════════════
     BOOTSTRAP
  ═══════════════════════════════════════════════════════════════ */
  function showNoData() {
    document.getElementById('main-content').innerHTML = `
      <div class="no-data">
        <div class="icon">📂</div>
        <h2>No Portfolio Data Found</h2>
        <p>Run the data extractor to generate <code>data.js</code>:</p>
        <br>
        <p><code>python extract_data.py</code></p>
        <br>
        <p>Or double-click <code>run_dashboard.bat</code> to extract data and reopen the dashboard automatically.</p>
      </div>`;
    document.getElementById('last-updated').textContent = 'data.js not found — run extract_data.py';
  }

  function init() {
    const data = window.PORTFOLIO_DATA;
    if (!data || !Array.isArray(data.portfolios) || !data.portfolios.length) {
      showNoData();
      return;
    }

    const portfolios = data.portfolios;
    const totalAll   = portfolios.reduce((s, p) => s + p.stats.total, 0);

    document.getElementById('last-updated').textContent = 'Last extracted: ' + data.generated;
    document.getElementById('total-pill').textContent   = totalAll.toLocaleString() + ' total records';

    const typeBar = document.getElementById('type-tabs-bar');
    const content  = document.getElementById('main-content');

    /* ── Overview type tab ── */
    const ovTypeBtn = document.createElement('button');
    ovTypeBtn.className   = 'type-tab-btn';
    ovTypeBtn.textContent = 'All Portfolios';
    ovTypeBtn.dataset.type = 'overview';
    ovTypeBtn.onclick = () => showTypeGroup('overview');
    typeBar.appendChild(ovTypeBtn);

    const ovPanel = document.createElement('div');
    ovPanel.id        = 'panel-overview';
    ovPanel.className = 'panel';
    ovPanel.innerHTML = buildOverviewHTML(portfolios);
    content.appendChild(ovPanel);
    _panels['panel-overview'] = { type: 'overview', portfolios };

    const ovSubBtn = document.createElement('button');
    ovSubBtn.className = 'sub-tab-btn';
    ovSubBtn.textContent = 'Overview';
    ovSubBtn.dataset.panel = 'panel-overview';
    ovSubBtn.onclick = () => showPanel('panel-overview');
    _typeSubTabs['overview'] = [{ btn: ovSubBtn, pid: 'panel-overview' }];

    /* ── Per-type tabs with sub-tabs ── */
    const groups = {};
    portfolios.forEach(p => {
      // Segmentation portfolios live under the same tab as EOI
      const navType = p.type === 'segmentation' ? 'eoi' : p.type;
      (groups[navType] = groups[navType] || []).push(p);
    });

    TYPE_ORDER.filter(t => groups[t]).forEach(type => {
      /* Tier-1 button */
      const typeBtn = document.createElement('button');
      typeBtn.className   = 'type-tab-btn';
      typeBtn.textContent = TYPE_LABELS[type] || type;
      typeBtn.dataset.type = type;
      typeBtn.onclick = () => showTypeGroup(type);
      typeBar.appendChild(typeBtn);

      _typeSubTabs[type] = [];

      /* ── EOI: prepend a combined overview sub-tab ── */
      if (type === 'eoi') {
        const eoiPortfolios = groups['eoi'].filter(p => p.type === 'eoi');
        const ovPid = 'panel-eoi-overview';

        const ovBtn = document.createElement('button');
        ovBtn.className = 'sub-tab-btn';
        ovBtn.textContent = 'Overview';
        ovBtn.dataset.panel = ovPid;
        ovBtn.onclick = () => showPanel(ovPid);
        _typeSubTabs[type].push({ btn: ovBtn, pid: ovPid });

        const ovPanel = document.createElement('div');
        ovPanel.id        = ovPid;
        ovPanel.className = 'panel';
        ovPanel.innerHTML = buildEoiOverviewHTML(eoiPortfolios);
        content.appendChild(ovPanel);
        _panels[ovPid] = { type: 'eoi-overview' };
      }

      /* Tier-2 sub-tabs + panels */
      groups[type].forEach((p, i) => {
        const pid = `panel-${type}-${i}`;

        const subBtn = document.createElement('button');
        subBtn.className = 'sub-tab-btn';
        subBtn.textContent = p.name;
        subBtn.dataset.panel = pid;
        subBtn.onclick = () => showPanel(pid);
        _typeSubTabs[type].push({ btn: subBtn, pid });

        const panel = document.createElement('div');
        panel.id        = pid;
        panel.className = 'panel';
        panel.innerHTML = {
          segmentation: buildSegmentationHTML,
          growth_plans: buildGrowthPlansHTML,
          eoi:          buildEoiHTML,
          yiw:          buildYiwHTML,
          buz_needs:    buildBuzNeedsHTML,
          devices:      buildDevicesHTML,
          foundation:   buildFoundationHTML,
          platforms:    buildPlatformsHTML,
        }[p.type]?.(p, pid) ?? buildGrowthPlansHTML(p, pid);
        content.appendChild(panel);
        _panels[pid] = { type: p.type, portfolio: p };
      });
    });

    // Add ESO Report tab
    const esoTypeBtn = document.createElement('button');
    esoTypeBtn.className   = 'type-tab-btn';
    esoTypeBtn.textContent = TYPE_LABELS['eso_report'];
    esoTypeBtn.dataset.type = 'eso_report';
    esoTypeBtn.onclick = () => showTypeGroup('eso_report');
    typeBar.appendChild(esoTypeBtn);

    // Only include portfolios with an 'eso' field and a valid type (not segmentation)
    const esoPortfolios = portfolios.filter(p => p.eso && p.type && p.type !== 'segmentation');

    // ESO Report main panel (list of ESOs)
    const esoListPanel = document.createElement('div');
    esoListPanel.id        = 'panel-eso-report-list';
    esoListPanel.className = 'panel';
    esoListPanel.innerHTML = buildEsoReportListHTML(esoPortfolios);
    content.appendChild(esoListPanel);
    _typeSubTabs['eso_report'] = [{ btn: (() => {
      const b = document.createElement('button');
      b.className = 'sub-tab-btn';
      b.textContent = 'ESO List';
      b.dataset.panel = 'panel-eso-report-list';
      b.onclick = () => showPanel('panel-eso-report-list');
      return b;
    })(), pid: 'panel-eso-report-list' }];
    _panels['panel-eso-report-list'] = { type: 'eso_report_list', portfolios: esoPortfolios };

    // Add a panel for each ESO (but not sub-tabs, only list links)
    const esoSet = new Set();
    esoPortfolios.forEach(p => esoSet.add(p.eso));
    Array.from(esoSet).forEach(eso => {
      const pid = `panel-eso-report-${eso.replace(/[^a-zA-Z0-9]/g,'_')}`;
      const panel = document.createElement('div');
      panel.id = pid;
      panel.className = 'panel';
      panel.innerHTML = buildEsoReportHTML(eso, esoPortfolios);
      content.appendChild(panel);
      _panels[pid] = { type: 'eso_report', eso, portfolios: esoPortfolios };
    });

    // Delegate click from ESO list to showPanel
    document.addEventListener('click', function(e) {
      if (e.target && e.target.classList.contains('eso-report-btn')) {
        const eso = e.target.dataset.eso;
        const pid = `panel-eso-report-${eso.replace(/[^a-zA-Z0-9]/g,'_')}`;
        showTypeGroup('eso_report');
        showPanel(pid);
      }
    });

    /* Show All Portfolios overview by default */
    showTypeGroup('overview');
  }

  /* ═══════════════════════════════════════════════════════════════
     REFRESH HINT
  ═══════════════════════════════════════════════════════════════ */
  window.showRefreshHint = function () {
    alert(
      'To refresh data with new Excel files:\n\n' +
      '1. Drop your .xlsx files into the same folder\n' +
      '2. Run:  python extract_data.py\n' +
      '3. Reload this page (F5)\n\n' +
      'Or double-click run_dashboard.bat for a one-step update.'
    );
  };

  // ═══════════════════════════════════════════════════════════════
  // ESO REPORT BUILDERS (NEW)
  // ═══════════════════════════════════════════════════════════════
  // Summary grid for all ESOs across all aspects
  function buildEsoReportSummaryGrid(esoPortfolios) {
    if (!esoPortfolios.length) return '<div class="no-data-note">No ESO data available</div>';
    // Collect all unique ESOs
    const esoSet = new Set(esoPortfolios.map(p => p.eso));
    const aspects = [
      { key: 'foundation', label: 'Foundation' },
      { key: 'yiw', label: 'Youth in Work' },
      { key: 'buz_needs', label: 'Business Needs' },
      { key: 'devices', label: 'Devices' },
      { key: 'platforms', label: 'Platforms' },
    ];
    // Build a lookup: aspect → eso → portfolio
    const aspectEsoMap = {};
    aspects.forEach(a => {
      aspectEsoMap[a.key] = {};
      esoPortfolios.forEach(p => {
        if (p.type === a.key && p.eso) aspectEsoMap[a.key][p.eso] = p;
      });
    });
    // Table header
    let html = '<div class="card" style="margin-bottom:18px"><h3>ESO Comparison Grid</h3>';
    html += '<div style="overflow-x:auto"><table class="eso-summary-table" style="border-collapse:collapse;width:100%">';
    html += '<thead><tr style="background:#F3F4F6">'
      + '<th style="padding:7px 10px;text-align:left;font-size:.9em">ESO</th>';
    aspects.forEach(a => {
      html += '<th style="padding:7px 10px;text-align:center;font-size:.9em">' + a.label + '</th>';
    });
    html += '</tr></thead><tbody>';
    // Table rows: one per ESO
    Array.from(esoSet).sort().forEach(eso => {
      html += '<tr>';
      html += '<td style="padding:7px 10px;font-weight:600">' + eso + '</td>';
      aspects.forEach(a => {
        const p = aspectEsoMap[a.key][eso];
        if (p) {
          html += '<td style="padding:7px 10px;text-align:center">'
            + '<button class="eso-report-btn" data-eso="' + eso + '" style="font-size:.9em;padding:4px 10px;border-radius:6px;border:none;background:#6366F1;color:#fff;cursor:pointer">View</button>'
            + '<div style="font-size:.8em;color:#64748B;margin-top:2px">' + (p.stats?.total?.toLocaleString() || '-') + '</div>'
            + '</td>';
        } else {
          html += '<td style="padding:7px 10px;text-align:center;color:#CBD5E1">—</td>';
        }
      });
      html += '</tr>';
    });
    html += '</tbody></table></div></div>';
    return html;
  }

  // ESO Report List: summary grid + quick links
  function buildEsoReportListHTML(esoPortfolios) {
    if (!esoPortfolios.length) return '<div class="no-data-note">No ESO data available</div>';
    // Summary grid
    let html = buildEsoReportSummaryGrid(esoPortfolios);
    // Quick links to each ESO
    const esoSet = new Set(esoPortfolios.map(p => p.eso));
    html += '<div class="card" style="margin-top:18px"><h3>Jump to ESO Report</h3>';
    html += '<div style="display:flex;flex-wrap:wrap;gap:10px">';
    Array.from(esoSet).sort().forEach(eso => {
      const pid = `panel-eso-report-${eso.replace(/[^a-zA-Z0-9]/g,'_')}`;
      html += '<button class="eso-report-btn" data-eso="' + eso + '" style="font-size:.95em;padding:7px 18px;border-radius:7px;border:none;background:#3B82F6;color:#fff;cursor:pointer">' + eso + '</button>';
    });
    html += '</div></div>';
    return html;
  }

  // Per-ESO report: show all aspects for a single ESO
  function buildEsoReportHTML(eso, esoPortfolios) {
    // Find all portfolios for this ESO, grouped by aspect
    const aspects = [
      { key: 'foundation', label: 'Foundation', builder: buildFoundationHTML },
      { key: 'yiw', label: 'Youth in Work', builder: buildYiwHTML },
      { key: 'buz_needs', label: 'Business Needs', builder: buildBuzNeedsHTML },
      { key: 'devices', label: 'Devices', builder: buildDevicesHTML },
      { key: 'platforms', label: 'Platforms', builder: buildPlatformsHTML },
    ];
    let html = '<div class="section-hdr"><h2>ESO Report: ' + eso + '</h2></div>';
    aspects.forEach(a => {
      const p = esoPortfolios.find(p => p.eso === eso && p.type === a.key);
      if (p) {
        html += '<div class="card" style="margin-bottom:18px"><h3>' + a.label + '</h3>';
        html += a.builder(p);
        html += '</div>';
      }
    });
    return html;
  }

  /* ─── Run ─── */
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
